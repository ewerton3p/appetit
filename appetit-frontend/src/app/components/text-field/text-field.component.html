<div class="form-field">
  <label [for]="inputId()" class="form-label">
    {{ label() }}
    @if (required()) {
      <span aria-hidden="true" class="text-red-500">*</span>
    }
  </label>
  <input
    [id]="inputId()"
    pInputText
    [type]="type()"
    [formControl]="formControl()"
    [placeholder]="placeholder()"
    class="w-full"
    [class.ng-invalid]="showError()"
    [class.ng-dirty]="showError()"
    [attr.autocomplete]="autocomplete() ?? null"
    [attr.min]="min() ?? null"
    [attr.step]="step() ?? null"
    [attr.aria-required]="required() || null"
    [attr.aria-describedby]="showError() ? inputId() + '-error' : null"
  />
  @if (showError()) {
    <span [id]="inputId() + '-error'" class="form-error" role="alert">
      @for (entry of activeErrors(); track entry.key) {
        {{ entry.message }}
      }
    </span>
  }
</div>
