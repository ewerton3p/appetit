<div class="mb-6">
  <h1 class="page-title !mb-0">
    {{ isNew() ? 'Novo Produto' : 'Editar Produto' }}
  </h1>
</div>

<div class="card max-w-lg">
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

    <app-text-field label="Nome" inputId="product-name" [control]="form.get('name')!" placeholder="Ex: Hambúrguer"
      [required]="true" autocomplete="off" [errors]="{ required: 'Informe o nome.' }" />

    <app-text-field label="Descrição" inputId="product-description" [control]="form.get('description')!"
      placeholder="Ex: Pão, carne e queijo" autocomplete="off" />

    <app-text-field label="Preço" inputId="product-price" [control]="form.get('price')!" placeholder="0,00"
      type="number" [min]="0" [step]="0.01" [required]="true"
      [errors]="{ required: 'O preço é obrigatório.', min: 'O preço deve ser maior ou igual a zero.' }" />

    <div class="flex gap-3 mt-6">
      <button type="submit" class="btn-primary px-5 py-2" [attr.aria-disabled]="form.invalid">
        {{ isNew() ? 'Criar Produto' : 'Salvar Alterações' }}
      </button>
      <button type="button" class="btn-secondary px-5 py-2" (click)="cancel()">
        Cancelar
      </button>
    </div>

  </form>
</div>
