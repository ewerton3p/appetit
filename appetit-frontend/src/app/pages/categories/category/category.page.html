<div class="mb-6">
  <h1 class="page-title !mb-0">
    {{ isNew() ? 'Nova Categoria' : 'Editar Categoria' }}
  </h1>
</div>

<div class="card max-w-lg">
  <form [formGroup]="form" (ngSubmit)="submit()" novalidate>

    <app-text-field label="Nome" inputId="category-name" [control]="form.get('name')!" placeholder="Ex: Bebidas"
      [required]="true" autocomplete="off"
      [errors]="{ required: 'O nome é obrigatório.', minlength: 'O nome deve ter pelo menos 2 caracteres.' }" />

    <div class="form-field">
      <label for="category-color" class="form-label">
        Cor <span aria-hidden="true" class="text-red-500">*</span>
      </label>
      <div class="color-picker-wrapper">
        <p-colorpicker inputId="category-color" formControlName="color" format="hex"
          aria-label="Selecionar cor da categoria" />
        <div class="color-preview" [style.background-color]="'#' + form.get('color')?.value" role="img"
          aria-label="Pré-visualização da cor selecionada"></div>
        <span class="color-hex-label">#{{ form.get('color')?.value }}</span>
      </div>
    </div>

    <div class="flex gap-3 mt-6">
      <button type="submit" class="btn-primary px-5 py-2" [disabled]="form.invalid" [attr.aria-disabled]="form.invalid">
        {{ isNew() ? 'Criar Categoria' : 'Salvar Alterações' }}
      </button>
      <button type="button" class="btn-secondary px-5 py-2" (click)="cancel()">
        Cancelar
      </button>
    </div>

  </form>
</div>
