<p-toast />
<div
  class="layout-wrapper"
  [style.grid-template-columns]="sidebarCollapsed() ? '1fr' : '220px 1fr'"
>
  @if (!sidebarCollapsed()) {
    <app-sidebar />
  }

  <div class="layout-main">
    <app-header (toggleSidebar)="sidebarCollapsed.update(v => !v)" />
    <main class="layout-content" id="main-content">
      <router-outlet />
    </main>
  </div>
</div>
